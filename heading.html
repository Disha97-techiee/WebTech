<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List in html</title>
</head>

<body>
    <ul>
        <!-- list me only normal tag nhi para and heading bhi aa sakta hai -->
        <!-- <li><h2>Want to buy: </h2>Bread</li> -->
        <li>Bread</li>
        <li>Jam</li>
        <li>Samosa</li>
        <li>Frooti</li>
        <li>Dosa</li>

    </ul>

<!-- we can also change type here by writing type="1"  for numeric and type="A" for alphabate capital or in smaller also type="a" -->
    <ol type="1">
        <li>Bread</li>
        <li>Jam</li>
        <li>Samosa</li>
        <li>Frooti</li>
        <li>Dosa</li>

    </ol>
</body>

</html>
